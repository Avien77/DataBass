<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Guardian</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="card form-card">
            <h2>Link Guardian to Student</h2>

            {% if message %}
            <p>{{ message }}</p>
            {% endif %}

            <form method="post" action="/link-guardian">
                <input type="text" name="stud_id" placeholder="Student ID" required>
                <input type="text" name="guard_id" placeholder="Guardian ID" required>
                <button type="submit">Link Guardian</button>
            </form>
        </div>
    </main>
</body>
</html>
