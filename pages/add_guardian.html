<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Guardian</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="card form-card">
            <h2>{{ "Edit Guardian" if guardian else "Add Guardian" }}</h2>

            {% if message %}
            <p>{{ message }}</p>
            {% endif %}

            <form method="post" action="{{ '/edit-guardian/' ~ guardian.Guardian_ID if guardian else '/add-guardian' }}">
                <input type="text" name="guard_id" placeholder="Guardian ID" value="{{ guardian.Guardian_ID if guardian else '' }}" {{ 'readonly' if guardian else ''}} required>
                <input type="text" name="first_name" placeholder="First Name" value="{{ guardian.Guardian_FName if guardian else '' }}" required>
                <input type="text" name="last_name" placeholder="Last Name" value="{{ guardian.Guardian_LName if guardian else '' }}" required>
                <input type="text" name="phone" placeholder="Phone Number" value="{{ guardian.Guardian_Phone if guardian else '' }}" required>
                <button type="submit">{{ 'Save Changes' if guardian else 'Add Guardian' }}</button>
            </form>
        </div>
    </main>
</body>
</html>
