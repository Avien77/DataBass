<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <aside class="sidebar">
        <h2>DataBass</h2>
        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/measurements">Input Measurements</a></li>
            <li><a href="/rental">View Rental</a></li>
            <li><a href="/add-student">Add Student</a></li>
            <li><a href="/assign-uniform">Assign Uniform</a></li>
            <li><a href="/return-item">Return Item</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="card form-card">
            <h2>Add Student</h2>

            {% if message %}
            <p>{{ message }}</p>
            {% endif %}

            <form method="post" action="/add-student">
                <input type="text" name="stud_id" placeholder="Student ID" required>
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="text" name="last_name" placeholder="Last Name" required>
                <input type="text" name="phone" placeholder="Phone Number">
                <input type="email" name="email" placeholder="Email Address">

                <select name="gender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>

                <select name="student_year" required>
                    <option value="">Select Year</option>
                    <option value="Freshman">Freshman</option>
                    <option value="Sophomore">Sophomore</option>
                    <option value="Junior">Junior</option>
                    <option value="Senior">Senior</option>
                </select>

                <select name="role">
                    <option value="">Select Role</option>
                    <option value="Regular">Regular</option>
                    <option value="Drum Major">Drum Major</option>
                    <option value="Colorguard">Colorguard</option>
                    <option value="Percussion">Percussion</option>
                </select>

                <button type="submit">Add Student</button>
            </form>
        </div>
    </main>

</body>
</html>
