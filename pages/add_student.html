<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="card form-card">
            <h2>{{ "Edit Student" if student else "Add Student" }}</h2>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <form method="post" action="{{ '/edit-student/' ~ student.Stud_ID if student else '/add-student' }}">
                <input type="text" name="stud_id" placeholder="Student ID" value="{{ student.Stud_ID if student else '' }}" {{ 'readonly' if student else '' }} required>
                <input type="text" name="first_name" placeholder="First Name" value="{{ student.Stud_FName if student else '' }}" required>
                <input type="text" name="last_name" placeholder="Last Name" value="{{ student.Stud_LName if student else '' }}" required>
                <input type="text" name="phone" placeholder="Phone Number" value="{{ student.Stud_Phone if student else '' }}">
                <input type="email" name="email" placeholder="Email Address" value="{{ student.Stud_Email if student else '' }}">

                <div class="select-buttons">
                    <select title="gender" name="gender">
                        <option value="">Select Gender</option>
                        <option value="Male" {{ 'selected' if student and student.Stud_Gender == 'Male' else '' }}>Male</option>
                        <option value="Female" {{ 'selected' if student and student.Stud_Gender == 'Female' else '' }}>Female</option>
                        <option value="Other" {{ 'selected' if student and student.Stud_Gender == 'Other' else '' }}>Other</option>
                    </select>

                    <select title="student-year" name="student_year" required>
                        <option value="">Select Year</option>
                        <option value="Freshman" {{ 'selected' if student and student.Year_Name == 'Freshman' else '' }}>Freshman</option>
                        <option value="Sophomore" {{ 'selected' if student and student.Year_Name == 'Sophomore' else '' }}>Sophomore</option>
                        <option value="Junior" {{ 'selected' if student and student.Year_Name == 'Junior' else '' }}>Junior</option>
                        <option value="Senior" {{ 'selected' if student and student.Year_Name == 'Senior' else '' }}>Senior</option>
                    </select>
                </div>

                <button type="submit">{{ "Save Changes" if student else "Add Student" }}</button>
            </form>
        </div>
    </main>

</body>
</html>
