<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Instrument</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="card form-card">
            <h2>{{ "Edit Instrument" if instrument else "Add Instrument" }}</h2>

            {% if message %}
            <p>{{ message }}</p>
            {% endif %}

            <form method="post" action="{{ '/edit-instrument/' ~ instrument.instrument_id if instrument else '/add-instrument' }}">
                <input type="text" name="instrument_id" placeholder="Instrument ID" value="{{ instrument.Instrument_ID if instrument else '' }}" {{ 'readonly' if instrument else ''}} required>
                
                <select title="Instrument Type" name="instrument_type" required>
                    <option value="">Select Instrument Type</option>
                    {% for instrument_type in instrument_types %}
                    <option value="{{ instrument_type.Instr_Type_ID }}" {{ 'selected' if instrument and instrument.Instr_Type_Name == instrument_type.Instr_Type_Name else '' }}>
                        {{ instrument_type.Instr_Type_Name }}
                    </option>
                    {% endfor %}
                </select>
                
                <input type="text" name="instrument_brand" placeholder="Instrument Brand" value="{{ instrument.Instrument_Brand if instrument else '' }}" required>
                <button type="submit">{{ 'Save Changes' if instrument else 'Add Instrument' }}</button>
            </form>
        </div>
    </main>
</body>
</html>
